<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}}</title>
  <style>
    :root {
      --ink: #17202a;
      --muted: #667085;
      --line: #d7dee8;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --c: #e8f3ff;
      --b: #eef8ee;
      --match: #fff4de;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    .page { max-width: 1440px; margin: 0 auto; padding: 34px; }
    .hero, .map, .asset-lists { display: grid; gap: 18px; }
    .hero { grid-template-columns: 1.2fr .8fr; margin-bottom: 18px; }
    .title, .legend, .lane, .flow, .list-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .title, .legend, .flow, .list-card { padding: 20px; }
    h1 { margin: 0 0 10px; font-size: 30px; line-height: 1.18; }
    p { margin: 0; color: var(--muted); line-height: 1.7; }
    .map { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .lane { overflow: hidden; }
    .lane h2 { margin: 0; padding: 16px 18px; font-size: 18px; border-bottom: 1px solid var(--line); }
    .lane.c h2 { background: var(--c); }
    .lane.match h2 { background: var(--match); }
    .lane.b h2 { background: var(--b); }
    .lane-body { padding: 16px; display: grid; gap: 12px; }
    .node {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(16, 24, 40, .04);
    }
    .node-title { font-weight: 700; margin-bottom: 8px; }
    .asset-counts {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
      margin-top: 12px;
    }
    .count-chip {
      display: grid;
      gap: 3px;
      min-height: 48px;
      border: 1px solid #dbe4ef;
      border-radius: 8px;
      background: #f8fbff;
      color: inherit;
      text-decoration: none;
      padding: 7px 8px;
    }
    .count-chip strong { font-size: 17px; line-height: 1; }
    .count-chip span { color: var(--muted); font-size: 11px; line-height: 1; }
    .asset-lists { grid-template-columns: repeat(2, minmax(0, 1fr)); margin-top: 18px; }
    .list-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .list-grid h4 { margin: 0 0 8px; font-size: 12px; }
    .list-grid ul { margin: 0; padding-left: 16px; color: var(--muted); font-size: 12px; line-height: 1.65; }
    @media (max-width: 980px) {
      .hero, .map, .asset-lists, .list-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="title">
        <h1>{{title}}</h1>
        <p>{{subtitle}}</p>
      </div>
      <div class="legend">
        <h2>阅读规则</h2>
        <p>业务框架默认可修改；每个节点只展示指标、维度、数据源、业务事实的数量；点击数量跳转到对应资产清单。</p>
      </div>
    </section>
    <section class="map">
      {{business_lanes}}
    </section>
    <section class="flow">
      <h2>下一步补充</h2>
      <p>{{next_steps}}</p>
    </section>
    <section class="asset-lists">
      {{asset_lists}}
    </section>
  </main>
</body>
</html>
